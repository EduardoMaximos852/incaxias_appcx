name: incaxias_appcx
description: "Caxias na palma da mão - Super App de Caxias-MA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ✅ Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.7.0

  # ✅ UI
  cached_network_image: ^3.3.1
  card_swiper: ^3.0.1
  google_fonts: ^6.2.1

  # ❌ REMOVIDO font_awesome_flutter (incompatível)
  # ❌ REMOVIDO icons_flutter (quebrado)

  # ✅ Mapas
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  flutter_polyline_points: ^2.0.0

  # ✅ Outros
  flutter_rating_bar: ^4.0.1
  video_player: ^2.8.3
  chewie: ^1.7.4
  provider: ^6.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/incaxias.png"
  min_sdk_android: 21

dependency_overrides:
  firebase_auth_web: ^5.9.3
  firebase_core_web: ^2.10.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/imagem/
    - assets/svg/